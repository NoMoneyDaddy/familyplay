name: Production Deploy

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  security-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: HEAD
          only-verified: true

  test:
    name: Lint + Type Check + Test
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm biome check .
      - run: pnpm turbo type-check
      - run: pnpm turbo test

  deploy-web:
    name: Deploy Web (Vercel Production)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Deploy to Vercel Production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel deploy --prod --token=$VERCEL_TOKEN

  run-migrations:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Push Migrations to Production
        run: npx supabase db push --db-url=${{ secrets.PRODUCTION_DATABASE_URL }}

  build-mobile:
    name: Build Mobile (EAS Production)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Build iOS Production
        run: cd apps/mobile && eas build --platform ios --profile production --non-interactive
      - name: Build Android Production
        run: cd apps/mobile && eas build --platform android --profile production --non-interactive

  notify:
    name: Telegram Notification
    runs-on: ubuntu-latest
    needs: [deploy-web, run-migrations, build-mobile]
    if: always()
    steps:
      - name: Send Notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEB_STATUS: ${{ needs.deploy-web.result }}
          DB_STATUS: ${{ needs.run-migrations.result }}
          MOBILE_STATUS: ${{ needs.build-mobile.result }}
        run: |
          if [ "$WEB_STATUS" = "success" ] && [ "$DB_STATUS" = "success" ]; then
            curl -s -X POST \
              "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d text="✅ 正式版已更新
          🌐 https://familyplay.app
          📱 iOS + Android build: $MOBILE_STATUS
          🗄  DB migrations: $DB_STATUS" \
              -d parse_mode="Markdown"
          else
            curl -s -X POST \
              "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d text="❌ 正式版部署失敗
          Web: $WEB_STATUS | DB: $DB_STATUS | Mobile: $MOBILE_STATUS
          請立即查看 GitHub Actions"
          fi
