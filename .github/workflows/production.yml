name: Production CI

on:
  push:
    branches: [main]

# main 只能透過 PR 合併（設定 Branch Protection）
# PR 跑 preview.yml 的 CI → 通過後才能合併
# 合併後此 workflow 執行 DB migration + 通知

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  run-migrations:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Push Migrations to Production Supabase
        continue-on-error: true
        run: npx supabase db push --db-url=${{ secrets.PRODUCTION_DATABASE_URL }}

  build-mobile-production:
    name: Build Mobile Production (EAS)
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[mobile]')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: |
          cd apps/mobile
          eas build --platform ios --profile production --non-interactive
          eas build --platform android --profile production --non-interactive

  notify:
    name: Telegram Notification
    runs-on: ubuntu-latest
    needs: [run-migrations]
    if: always()
    steps:
      - name: Send Notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DB_STATUS: ${{ needs.run-migrations.result }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          SHORT_MSG=$(echo "$COMMIT_MSG" | head -1 | cut -c1-60)
          if [ "$DB_STATUS" = "success" ]; then
            curl -s -X POST \
              "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d text="🚀 正式版已合併，Zeabur 正在部署至台北節點
          🗄 DB migrations: 完成
          $SHORT_MSG"
          else
            curl -s -X POST \
              "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d text="⚠️ 正式版已部署但 DB migration 失敗！
          請立即至 Supabase Dashboard 手動執行 migration
          DB: $DB_STATUS"
          fi
