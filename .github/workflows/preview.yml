name: Preview Deploy

on:
  push:
    branches: [develop]

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: HEAD
          only-verified: true

  test:
    name: Lint + Type Check + Test
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm biome check .
      - run: pnpm turbo type-check
      - run: pnpm turbo test

  deploy-preview:
    name: Deploy Preview (Vercel)
    runs-on: ubuntu-latest
    needs: test
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          URL=$(npx vercel deploy \
            --token=$VERCEL_TOKEN \
            --env NEXT_PUBLIC_SUPABASE_URL=${{ secrets.STAGING_SUPABASE_URL }} \
            --env NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.STAGING_SUPABASE_ANON_KEY }})
          echo "url=$URL" >> $GITHUB_OUTPUT

  build-mobile-preview:
    name: Build Mobile Preview (EAS)
    runs-on: ubuntu-latest
    needs: test
    if: contains(github.event.head_commit.message, '[mobile]')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Build iOS Preview
        run: cd apps/mobile && eas build --platform ios --profile preview --non-interactive
      - name: Build Android Preview
        run: cd apps/mobile && eas build --platform android --profile preview --non-interactive

  notify:
    name: Telegram Notification
    runs-on: ubuntu-latest
    needs: [deploy-preview]
    if: always()
    steps:
      - name: Send Notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEPLOY_URL: ${{ needs.deploy-preview.outputs.url }}
          STATUS: ${{ needs.deploy-preview.result }}
        run: |
          if [ "$STATUS" = "success" ]; then
            EMOJI="🔍"
            MSG="預覽版已更新\n🌐 $DEPLOY_URL\n📱 Mobile build: 僅在 commit 含 [mobile] 時觸發"
          else
            EMOJI="❌"
            MSG="預覽版部署失敗\n請查看 GitHub Actions"
          fi
          curl -s -X POST \
            "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -d chat_id="$CHAT_ID" \
            -d text="$EMOJI $MSG" \
            -d parse_mode="Markdown"
