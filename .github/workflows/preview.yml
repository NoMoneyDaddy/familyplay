name: Preview CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]

# PR 和 push 都跑 CI：
#   push develop  → Zeabur 自動部署 staging（CI 結果只通知，不擋部署）
#   PR → develop  → CI 必須通過才能合併（branch protection 控制）
#   PR → main     → CI 必須通過才能合併（最重要的守門員）

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    # PR 事件沒有 event.before，改掃整個 branch
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: TruffleHog Secret Scan
        run: |
          docker run --rm -v .:/tmp -w /tmp \
            ghcr.io/trufflesecurity/trufflehog:latest \
            git file:///tmp/ \
            --since-commit ${{ github.event.pull_request.base.sha || github.event.before }} \
            --branch ${{ github.event.pull_request.head.sha || github.sha }} \
            --only-verified \
            --fail \
            --no-update \
            --github-actions

  test:
    name: Lint + Type Check + Test
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm biome check .
      - run: pnpm turbo type-check
      - run: pnpm turbo test

  build-apk-preview:
    name: Build Android APK Preview (EAS)
    runs-on: ubuntu-latest
    needs: test
    # commit message 含 [mobile] 才觸發，省 EAS 額度。
    # 只建 Android APK：不需要 Apple 憑證，且 iOS 失敗不會擋住 APK 產出。
    if: |
      github.event_name == 'push' &&
      contains(github.event.head_commit.message, '[mobile]')
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      # preview profile 的 android.buildType = apk → 產出可直接安裝的 APK
      - run: eas build --platform android --profile preview --non-interactive --no-wait
        working-directory: apps/mobile

  notify:
    name: Telegram Notification
    runs-on: ubuntu-latest
    needs: [test]
    # 只在 push 時通知（不在 PR 通知，避免 spam）
    if: always() && github.event_name == 'push'
    steps:
      - name: Send Notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_STATUS: ${{ needs.test.result }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          SHORT_MSG=$(echo "$COMMIT_MSG" | head -1 | cut -c1-60)
          if [ "$TEST_STATUS" = "success" ]; then
            curl -s -X POST \
              "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d text="✅ [$BRANCH] CI 通過，Zeabur 正在部署...
          $SHORT_MSG"
          else
            curl -s -X POST \
              "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d text="❌ [$BRANCH] CI 失敗
          $SHORT_MSG
          ⚠️ Zeabur 可能已部署壞版本，請至 Dashboard rollback"
          fi
