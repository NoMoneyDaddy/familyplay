name: Preview CI

on:
  push:
    branches: [develop]

# Zeabur 透過 GitHub 整合自動偵測 push → 自動部署 develop 分支
# 此 workflow 負責：安全掃描 + 測試 + Mobile build（選擇性）+ 通知

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: HEAD
          only-verified: true

  test:
    name: Lint + Type Check + Test
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm biome check .
      - run: pnpm turbo type-check
      - run: pnpm turbo test

  build-mobile-preview:
    name: Build Mobile Preview (EAS)
    runs-on: ubuntu-latest
    needs: test
    # commit message 含 [mobile] 才觸發，省 EAS 額度
    if: contains(github.event.head_commit.message, '[mobile]')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Build iOS + Android Preview
        run: |
          cd apps/mobile
          eas build --platform ios --profile preview --non-interactive
          eas build --platform android --profile preview --non-interactive

  notify:
    name: Telegram Notification
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Send Notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEST_STATUS: ${{ needs.test.result }}
        run: |
          if [ "$TEST_STATUS" = "success" ]; then
            curl -s -X POST \
              "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d text="🔍 預覽版 CI 通過，Zeabur 正在部署 develop 分支..."
          else
            curl -s -X POST \
              "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -d chat_id="$CHAT_ID" \
              -d text="❌ 預覽版 CI 失敗（test/lint），Zeabur 部署已取消。請查看 GitHub Actions。"
          fi
